<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff41"/>
      <stop offset="100%" style="stop-color:#00cc33"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00ff41" flood-opacity="0.5"/>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="250" fill="url(#bg)" stroke="url(#glow)" stroke-width="4"/>
  <!-- Orbital rings -->
  <ellipse cx="256" cy="256" rx="180" ry="60" fill="none" stroke="#00ff41" stroke-width="2" opacity="0.4" transform="rotate(-30 256 256)"/>
  <ellipse cx="256" cy="256" rx="180" ry="60" fill="none" stroke="#00ff41" stroke-width="2" opacity="0.4" transform="rotate(30 256 256)"/>
  <ellipse cx="256" cy="256" rx="180" ry="60" fill="none" stroke="#00ff41" stroke-width="2" opacity="0.4" transform="rotate(90 256 256)"/>
  <!-- Core sphere -->
  <circle cx="256" cy="256" r="80" fill="url(#glow)" filter="url(#shadow)" opacity="0.9"/>
  <!-- Inner detail -->
  <circle cx="256" cy="256" r="50" fill="none" stroke="#0a0a0a" stroke-width="3" opacity="0.6"/>
  <circle cx="256" cy="256" r="20" fill="#0a0a0a" opacity="0.8"/>
  <!-- Stars -->
  <circle cx="100" cy="120" r="3" fill="#00ff41" opacity="0.8"/>
  <circle cx="400" cy="100" r="2" fill="#00ff41" opacity="0.6"/>
  <circle cx="80" cy="380" r="2" fill="#00ff41" opacity="0.7"/>
  <circle cx="420" cy="400" r="3" fill="#00ff41" opacity="0.5"/>
  <circle cx="150" cy="200" r="1.5" fill="#00ff41" opacity="0.9"/>
  <circle cx="350" cy="180" r="1.5" fill="#00ff41" opacity="0.8"/>
  <circle cx="200" cy="420" r="2" fill="#00ff41" opacity="0.6"/>
  <circle cx="320" cy="80" r="2" fill="#00ff41" opacity="0.7"/>
  <!-- Text OG -->
  <text x="256" y="270" text-anchor="middle" font-family="monospace" font-size="36" font-weight="bold" fill="#0a0a0a" opacity="0.9">OG</text>
</svg>
